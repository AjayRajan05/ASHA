name: PrivySHA CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.11"]
        include:
          - os: ubuntu-latest
            python-version: "3.10"
          - os: ubuntu-latest
            python-version: "3.12"

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"
        pip install build twine

    - name: Lint (flake8)
      if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
      run: flake8 src/privysha --select=F401,F824 --count --show-source

    - name: Type check (mypy)
      if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
      run: mypy src/privysha --ignore-missing-imports

    - name: Run unit tests
      run: pytest --cov=privysha --cov-report=xml --cov-report=term --cov-fail-under=40 -m "not slow"

    - name: Run slow tests
      if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
      run: pytest tests_v2/test_performance.py -m slow -v

    - name: Run benchmark smoke test
      if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
      run: python benchmarks/run_benchmarks.py --save
      timeout-minutes: 5
      env:
        PRIVYSHA_DISABLE_ML: "1"

    - name: Benchmark quality gates
      if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
      run: |
        python benchmarks/run_benchmarks.py
      timeout-minutes: 5
      env:
        PRIVYSHA_DISABLE_ML: "1"

    - name: Regression benchmark vs baseline
      if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
      run: python benchmarks/run_benchmarks.py --compare benchmarks/baseline/results.json
      timeout-minutes: 5
      env:
        PRIVYSHA_DISABLE_ML: "1"

    - name: Build documentation
      if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
      run: |
        pip install -e ".[docs]"
        mkdocs build --strict

    - name: Build wheel
      if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
      run: |
        python -m build
        twine check dist/*

    - name: Fresh-install smoke test
      if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
      run: |
        python -m pip install dist/*.whl --force-reinstall
        python -c "from privysha import process, sanitize; assert sanitize('a@b.com'); print(process('hello'))"

    - name: Upload coverage artifact
      if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
      uses: actions/upload-artifact@v7
      with:
        name: coverage-report-${{ matrix.python-version }}
        path: coverage.xml

    - name: Upload benchmark artifact
      if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
      uses: actions/upload-artifact@v7
      with:
        name: benchmark-results
        path: benchmarks/output/
