name: ASHA CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.11"]
        include:
          - os: ubuntu-latest
            python-version: "3.10"
          - os: ubuntu-latest
            python-version: "3.12"

    steps:
    - name: Checkout repository
      uses: actions/checkout@v7

    - name: Setup Python
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"
        pip install build twine

    - name: Check for dependency conflicts
      run: pip check

    - name: Lint (flake8)
      if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
      run: flake8 src/asha --select=F401,F824 --count --show-source

    - name: Type check (mypy)
      if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
      run: mypy src/asha --ignore-missing-imports

    - name: Architecture boundary tests
      if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
      run: pytest tests/architecture tests/imports tests/public_api -q

    - name: Run unit tests
      run: pytest --cov=asha --cov-report=xml --cov-report=term --cov-fail-under=50 -m "not slow"

    - name: Run ANCHOR tests
      if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
      run: pytest tests/runtime/anchor/ -q

    - name: Run slow tests
      if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
      run: pytest tests/test_performance.py -m slow -v

    - name: Run benchmark smoke test
      if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
      run: python benchmarks/run_benchmarks.py --save
      timeout-minutes: 5
      env:
        ASHA_DISABLE_ML: "1"

    - name: Semantic equivalence quality gate
      if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
      run: |
        python - <<'EOF'
        import json, sys
        sys.path.insert(0, "src")
        from asha.core.benchmark import check_semantic_equivalence
        with open("benchmarks/output/results.json") as f:
            data = json.load(f)
        results = data.get("results", [])
        sem_eq_pass = sum(
            1 for r in results
            if check_semantic_equivalence(r["input_prompt"], r["output_prompt"])
        )
        total = len(results)
        rate = sem_eq_pass / total if total else 0
        print(f"Semantic equivalence: {sem_eq_pass}/{total} ({rate:.0%})")
        if rate < 0.30:
            print(f"FAIL: semantic_equivalence rate {rate:.0%} < 30% gate", file=sys.stderr)
            sys.exit(1)
        EOF
      env:
        ASHA_DISABLE_ML: "1"

    - name: Prompt repair quality gate
      if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
      run: |
        python - <<'EOF'
        import json, sys
        with open("benchmarks/output/results.json") as f:
            data = json.load(f)
        results = data.get("results", [])
        repair_pass = sum(1 for r in results if r.get("metrics", {}).get("prompt_repair") is True)
        total = len(results)
        rate = repair_pass / total if total else 0
        print(f"Prompt repair: {repair_pass}/{total} ({rate:.0%})")
        if rate < 1.0:
            print(f"FAIL: prompt_repair rate {rate:.0%} < 100% gate", file=sys.stderr)
            sys.exit(1)
        EOF
      env:
        ASHA_DISABLE_ML: "1"

    - name: Regression benchmark vs baseline
      if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
      run: python benchmarks/run_benchmarks.py --compare benchmarks/baseline/results.json
      timeout-minutes: 5
      env:
        ASHA_DISABLE_ML: "1"

    - name: Build documentation
      if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
      run: |
        pip install -e ".[docs]"
        mkdocs build --strict

    - name: Build wheel
      if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
      run: |
        python -m build
        twine check dist/*

    - name: Fresh-install smoke test
      if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
      run: |
        python -m pip install dist/*.whl --force-reinstall
        python -c "from asha import process, sanitize, anchor, Agent; assert sanitize('a@b.com'); print(process('hello')); print(anchor(Agent(provider='mock', model='mock')))"

    - name: Upload coverage artifact
      if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
      uses: actions/upload-artifact@v7
      with:
        name: coverage-report-${{ matrix.python-version }}
        path: coverage.xml

    - name: Upload benchmark artifact
      if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
      uses: actions/upload-artifact@v7
      with:
        name: benchmark-results
        path: benchmarks/output/

  integration:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v7

    - name: Setup Python
      uses: actions/setup-python@v6
      with:
        python-version: "3.11"

    - name: Install package with optional framework deps
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev,integrations,flask,django,llamaindex]"
        pip install "crewai>=0.80.0,<1.0.0" "langgraph>=0.2.0,<1.0.0"

    - name: Check for dependency conflicts
      run: pip check

    - name: Framework integration smoke tests
      run: |
        pytest \
          tests/test_framework_smoke.py \
          tests/test_fastapi_integration.py \
          tests/test_django_integration.py \
          tests/test_langchain_integration.py \
          tests/test_llamaindex_integration.py \
          tests/test_instructor_integration.py \
          -q --tb=short
      env:
        ASHA_DISABLE_ML: "1"
        ASHA_ANCHOR_INTERACTIVE: "0"

    - name: ANCHOR adapter smoke (real imports)
      run: |
        python - <<'EOF'
        import crewai
        import langchain_core
        import llama_index.core
        from asha.runtime.anchor.adapters import anchor_any
        print("crewai", crewai.__version__)
        print("langchain_core", langchain_core.__version__)
        print("llama_index", llama_index.core.__version__)
        print("anchor_any", anchor_any)
        EOF

