name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  id-token: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build twine pytest pytest-cov
          pip install -e ".[dev]"

      - name: Run tests before publish
        run: python -m pytest tests_v2/ tests/ -q --tb=no -m "not slow" --cov=privysha --cov-fail-under=40
        env:
          PRIVYSHA_DISABLE_ML: "1"

      - name: Run benchmark quality gates
        run: |
          python benchmarks/run_benchmarks.py
          python benchmarks/run_benchmarks.py --compare benchmarks/baseline/results.json
        env:
          PRIVYSHA_DISABLE_ML: "1"

      - name: Build package
        run: python -m build

      - name: Check distribution
        run: twine check dist/*

      - name: Fresh-install smoke test
        run: |
          python -m pip install dist/*.whl --force-reinstall
          python -c "from privysha import process, sanitize; assert sanitize('a@b.com'); print(process('hello'))"

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
