    "spacy>=3.4.0,<4.0.0",
    "fastapi>=0.100.0,<1.0.0",
    "starlette>=0.27.0,<1.0.0",
    "uvicorn>=0.23.0,<1.0.0",
    "langchain-core>=0.1.0,<2.0.0",
    "langchain-openai>=0.1.0,<1.0.0",
    "instructor>=0.4.0,<2.0.0",
    "flask>=2.0.0,<4.0.0",
    "django>=4.0.0,<6.0.0",
    "guardrails-ai>=0.4.0,<1.0.0",
    "opentelemetry-api>=1.20.0,<3.0.0",
    "opentelemetry-sdk>=1.20.0,<3.0.0",
    "llama-index-core>=0.10.0,<1.0.0",
]

[project.urls]
Homepage = "https://github.com/AjayRajan05/privySHA"
Issues = "https://github.com/AjayRajan05/privySHA/issues"
Changelog = "https://github.com/AjayRajan05/privySHA/blob/main/CHANGELOG.md"

[project.scripts]
privysha = "privysha.cli:main"

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
privysha = ["py.typed"]
"privysha.local_advisor.catalog" = ["fallback.json"]
"*" = ["*.md", "*.txt"]

[tool.black]
line-length = 88
target-version = ['py310']
include = '\.pyi?$'
extend-exclude = '''
/(
  # directories
  \.eggs
  | \.git
  | \.hg
  | \.mypy_cache
  | \.tox
  | \.venv
  | build
  | dist
)/
'''

[tool.mypy]
python_version = "3.10"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true
disallow_incomplete_defs = true
check_untyped_defs = true
disallow_untyped_decorators = true
no_implicit_optional = true
warn_redundant_casts = true
warn_unused_ignores = true
warn_no_return = true
warn_unreachable = true
strict_equality = true

[tool.pytest.ini_options]
minversion = "7.0"
addopts = "-ra -q --strict-markers --strict-config -m \"not integration\""
testpaths = ["tests", "tests_v2"]
python_files = ["test_*.py", "*_test.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
asyncio_mode = "auto"
markers = [
    "slow: marks tests as slow (deselect with '-m \"not slow\"')",
    "integration: marks tests as integration tests (require API keys)"
]

[tool.coverage.run]
source = ["src"]
omit = [
    "*/tests/*",
    "*/test_*",
    "*/__pycache__/*",
    "*/site-packages/*"
]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "if self.debug:",
    "if settings.DEBUG",
    "raise AssertionError",
    "raise NotImplementedError",
    "if 0:",
    "if __name__ == .__main__.:"
]