[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "privysha"
version = "0.3.0"
description = "Drop-in security + optimization layer for LLM apps (developer preview)"
readme = "README.md"
license = {file = "LICENSE"}
authors = [
    {name = "Ajay Rajan A", email = "ajayrajan727@gmail.com"}
]
maintainers = [
    {name = "Ajay Rajan A", email = "ajayrajan727@gmail.com"}
]
keywords = [
    "llm",
    "security",
    "optimization",
    "privacy",
    "pii-detection",
    "openai",
    "anthropic",
    "gemini",
    "prompt-engineering"
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
    "Topic :: Security",
    "Topic :: Text Processing",
    "Topic :: Internet :: WWW/HTTP :: Dynamic Content"
]
requires-python = ">=3.10"
dependencies = [
    "pydantic>=2.0.0,<3.0.0",
    "tiktoken>=0.5.0,<2.0.0",
    "requests>=2.28.0,<3.0.0",
    "python-dotenv>=1.0.0,<2.0.0",
    "click>=8.0.0,<9.0.0"
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0.0,<10.0.0",
    "pytest-cov>=4.0.0,<8.0.0",
    "pytest-asyncio>=0.21.0,<2.0.0",
    "black>=22.0.0,<26.0.0",
    "flake8>=5.0.0,<8.0.0",
    "mypy>=1.0.0,<2.0.0"
]
docs = [
    "mkdocs>=1.4.0,<3.0.0",
    "mkdocs-material>=8.5.0,<10.0.0",
    "mkdocstrings[python]>=0.19.0,<1.0.0"
]
openai = [
    "openai>=1.0.0,<3.0.0"
]
anthropic = [
    "anthropic>=0.5.0,<1.0.0"
]
gemini = [
    "google-generativeai>=0.3.0,<1.0.0"
]
transformers = [
    "transformers>=4.20.0,<5.0.0",
    "torch>=1.12.0,<3.0.0",
    "accelerate>=0.20.0,<2.0.0"
]
ml = [
    "spacy>=3.4.0,<4.0.0",
    "transformers>=4.20.0,<5.0.0",
    "torch>=1.12.0,<3.0.0",
    "accelerate>=0.20.0,<2.0.0"
]
fastapi = [
    "fastapi>=0.100.0,<1.0.0",
    "starlette>=0.27.0,<1.0.0",
    "uvicorn>=0.23.0,<1.0.0",
]
flask = [
    "flask>=2.0.0,<4.0.0",
]
django = [
    "django>=4.0.0,<6.0.0",
]
langchain = [
    "langchain-core>=0.1.0,<2.0.0",
    "langchain-openai>=0.1.0,<1.0.0",
]
instructor = [
    "instructor>=0.4.0,<2.0.0",
    "openai>=1.0.0,<3.0.0",
]
guardrails = [
    "guardrails-ai>=0.4.0,<1.0.0",
]
integrations = [
    "fastapi>=0.100.0,<1.0.0",
    "starlette>=0.27.0,<1.0.0",
    "uvicorn>=0.23.0,<1.0.0",
    "langchain-core>=0.1.0,<2.0.0",
    "langchain-openai>=0.1.0,<1.0.0",
    "instructor>=0.4.0,<2.0.0",
    "openai>=1.0.0,<3.0.0",
